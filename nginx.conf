# ============================================
# Blog System — Nginx Production Configuration
# ============================================
# Place at: /etc/nginx/sites-available/blog
# Enable:   ln -s /etc/nginx/sites-available/blog /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   nginx -s reload
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # ====================================
    # SSL (uncomment after obtaining certs)
    # ====================================
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # ====================================
    # Security headers
    # ====================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ====================================
    # Blog Frontend (Astro static files)
    # ====================================
    root /opt/blog/current;
    index index.html;

    location / {
        try_files $uri $uri/ /404.html;
    }

    # Static assets with long cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded images
    location /uploads/ {
        alias /opt/blog/apps/blog-web/public/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Static data (heatmap, stats, etc.)
    location /data/ {
        alias /opt/blog/apps/blog-web/public/data/;
        expires 1d;
        add_header Cache-Control "public";
    }

    # ====================================
    # Admin Web (Vue SPA)
    # ====================================
    location /admin {
        alias /opt/blog/apps/admin-web/dist/;
        try_files $uri $uri/ /admin/index.html;

        # No caching for admin SPA (sensitive)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";

        # Admin should NOT be indexed by search engines
        add_header X-Robots-Tag "noindex, nofollow";
    }

    # ====================================
    # Admin API (Go backend)
    # ====================================
    location /api/ {
        # Proxy to Go admin API
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        # Don't buffer build logs
        proxy_buffering off;

        # Rate limiting for login endpoint
        location /api/admin/login {
            proxy_pass http://127.0.0.1:8080;
            # Limit login attempts: 5 per minute per IP
            limit_req zone=login_limit burst=3 nodelay;
        }
    }

    # ====================================
    # Deny access to hidden files
    # ====================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive paths
    location ~ ^/(data|scripts|storage|releases) {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ====================================
# Rate limiting zones
# ====================================
# Define in http block of nginx.conf:
#   limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
